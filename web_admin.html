<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok视频管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .card h2 { color: #333; margin-bottom: 20px; font-size: 1.3em; display: flex; align-items: center; gap: 10px; }
        .card h2 .icon { font-size: 1.5em; }
        .status { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .status-item { flex: 1; min-width: 200px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .status-item label { display: block; color: #666; font-size: 0.85em; margin-bottom: 5px; }
        .status-item .value { font-size: 1.2em; font-weight: bold; color: #333; }
        .status-item .value.success { color: #10b981; }
        .status-item .value.error { color: #ef4444; }
        .btn { display: inline-block; padding: 12px 30px; border-radius: 25px; font-weight: 600; font-size: 1em; cursor: pointer; border: none; transition: all 0.3s; text-decoration: none; text-align: center; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #6b7280; color: white; }
        .btn-secondary:hover { background: #4b5563; }
        
        /* TikTok Login Button Style */
        .btn-tiktok {
            background: #000;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-tiktok:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-tiktok svg {
            width: 20px;
            height: 20px;
        }
        
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #666; margin-bottom: 8px; font-weight: 500; }
        .form-group input[type="text"], .form-group input[type="file"] { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1em; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .progress { background: #e5e7eb; border-radius: 10px; height: 20px; overflow: hidden; margin-top: 15px; display: none; }
        .progress-bar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100%; width: 0%; transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.85em; }
        .alert { padding: 15px; border-radius: 10px; margin-top: 15px; display: none; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
        .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #3b82f6; }
        .history-list { max-height: 400px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f8f9fa; border-radius: 10px; margin-bottom: 10px; }
        .history-item .info { flex: 1; }
        .history-item .name { font-weight: bold; color: #333; margin-bottom: 5px; }
        .history-item .meta { font-size: 0.85em; color: #666; }
        .history-item .status-badge { padding: 5px 15px; border-radius: 20px; font-size: 0.85em; font-weight: bold; }
        .status-uploaded { background: #d1fae5; color: #065f46; }
        .status-published { background: #dbeafe; color: #1e40af; }
        .status-failed { background: #fee2e2; color: #991b1b; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
        .info-text { color: #666; font-size: 0.9em; margin-top: 10px; }
        
        /* Header with login status */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .user-info {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-logout {
            background: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-logout:hover {
            background: rgba(220, 38, 38, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 TikTok视频管理系统</h1>
            <div id="userInfo" class="user-info" style="display: none;">
                <span>👤</span>
                <span id="userDisplay">已登录</span>
                <button class="btn-logout" onclick="logout()">🔓 退出登录</button>
            </div>
        </div>
        
        <!-- 登录卡片 - 仅在未授权时显示 -->
        <div class="card" id="loginCard">
            <h2><span class="icon">🔐</span> 登录 TikTok</h2>
            <p style="color: #666; margin-bottom: 20px;">请使用您的 TikTok 账号登录以使用视频发布功能</p>
            <button class="btn-tiktok" onclick="loginWithTikTok()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v14.77a2.86 2.86 0 0 1-5.14 1.9 2.85 2.85 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .84.13V11.4a6.32 6.32 0 0 0-.84-.06 6.36 6.36 0 0 0 0 12.72 6.36 6.36 0 0 0 6.36-6.36v-7a7.45 7.45 0 0 0 4.19 1.34V9.4a4.85 4.85 0 0 1-3.5-2.71z"/>
                </svg>
                Login with TikTok
            </button>
            <div id="loginAlert" class="alert" style="margin-top: 20px;"></div>
        </div>
        
        <!-- 状态卡片 -->
        <div class="card" id="statusCard">
            <h2><span class="icon">📊</span> 系统状态</h2>
            <div class="status">
                <div class="status-item">
                    <label>授权状态</label>
                    <div class="value" id="authStatus">检查中...</div>
                </div>
                <div class="status-item">
                    <label>Token过期时间</label>
                    <div class="value" id="tokenExpiry">-</div>
                </div>
                <div class="status-item">
                    <label>待处理上传</label>
                    <div class="value" id="pendingCount">-</div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="checkStatus()">🔄 刷新状态</button>
            </div>
            <div id="statusAlert" class="alert"></div>
        </div>
        
        <!-- 发布选项卡片 -->
        <div class="card">
            <h2><span class="icon">📤</span> 发布视频</h2>
            <div class="form-group">
                <label>选择视频文件</label>
                <input type="file" id="videoFile" accept="video/mp4,video/*">
            </div>
            <div class="form-group">
                <label>视频标题（可选）</label>
                <input type="text" id="videoTitle" placeholder="输入视频标题">
            </div>
            <div class="form-group">
                <label>视频描述（可选）</label>
                <input type="text" id="videoDesc" placeholder="输入视频描述">
            </div>
            <div class="form-group">
                <label>隐私级别</label>
                <select id="privacyLevel" style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1em;">
                    <option value="" disabled selected>Please authorize to see available options</option>
                    <option value="SELF_ONLY">Self Only (Default)</option>
                    <option value="PRIVATE">Private</option>
                    <option value="MUTUAL_FOLLOW_FRIENDS">Mutual Follow Friends</option>
                    <option value="FOLLOWER_OF_CREATOR">Followers Only</option>
                    <option value="PUBLIC_TO_EVERYONE">Public</option>
                </select>
            </div>
            <div class="btn-group">
                <button class="btn btn-success" onclick="uploadVideo()" id="uploadBtn">📥 上传到收件箱</button>
                <button class="btn btn-primary" onclick="publishVideo()" id="publishBtn">🚀 直接发布</button>
            </div>
            <div class="progress" id="uploadProgress">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
           
        </div>
        
        <!-- 历史记录卡片 -->
        <div class="card">
            <h2><span class="icon">📜</span> 上传历史</h2>
            <button class="btn btn-secondary" onclick="loadHistory()">🔄 刷新历史</button>
            <div class="history-list" id="historyList" style="margin-top: 15px;">
                <p style="color: #666; text-align: center; padding: 20px;">暂无上传记录</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/tiktok';
        const API_KEY = 'bebcare_internal_key_2026';
        let isUploading = false;

        function getHeaders() {
            return {
                'X-API-Key': API_KEY,
                'Accept': 'application/json'
            };
        }

        async function loginWithTikTok() {
            try {
                showAlert('login', 'info', '正在获取授权链接...');
                const response = await fetch(`${API_BASE}/auth/url`, { headers: getHeaders() });
                const data = await response.json();
                
                if (data.auth_url) {
                    // 在当前窗口打开授权页面，或者新窗口
                    window.location.href = data.auth_url;
                } else {
                    showAlert('login', 'error', '获取授权链接失败');
                }
            } catch (error) {
                showAlert('login', 'error', '登录失败: ' + error.message);
            }
        }

        async function logout() {
            if (!confirm('确定要退出登录吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/logout`, {
                    method: 'POST',
                    headers: getHeaders()
                });
                const data = await response.json();
                
                if (data.success) {
                    showAlert('status', 'success', '退出登录成功');
                    checkStatus();
                } else {
                    showAlert('status', 'error', '退出登录失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                showAlert('status', 'error', '退出登录失败: ' + error.message);
            }
        }

        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/status`, { headers: getHeaders() });
                const data = await response.json();
                
                const authStatus = document.getElementById('authStatus');
                const tokenExpiry = document.getElementById('tokenExpiry');
                const loginCard = document.getElementById('loginCard');
                const userInfo = document.getElementById('userInfo');
                const userDisplay = document.getElementById('userDisplay');
                
                if (data.status === 'valid') {
                    authStatus.textContent = '✅ 已授权';
                    authStatus.className = 'value success';
                    tokenExpiry.textContent = data.expires_at ? new Date(data.expires_at).toLocaleString('zh-CN') : '-';
                    loginCard.style.display = 'none';
                    userInfo.style.display = 'flex';
                    userDisplay.textContent = '已登录 TikTok';
                    
                    await loadPrivacyLevels();
                } else if (data.status === 'no_token') {
                    authStatus.textContent = '❌ 未授权';
                    authStatus.className = 'value error';
                    tokenExpiry.textContent = '-';
                    loginCard.style.display = 'block';
                    userInfo.style.display = 'none';
                } else {
                    authStatus.textContent = '⚠️ ' + data.status;
                    authStatus.className = 'value';
                    tokenExpiry.textContent = '-';
                    loginCard.style.display = 'block';
                    userInfo.style.display = 'none';
                }
                
                document.getElementById('statusAlert').className = 'alert alert-info';
                document.getElementById('statusAlert').textContent = `用户ID: ${data.user_id || '-'}`;
                document.getElementById('statusAlert').style.display = 'block';
                
                loadHistory();
            } catch (error) {
                showAlert('status', 'error', '状态检查失败: ' + error.message);
            }
        }

        async function loadPrivacyLevels() {
            try {
                const response = await fetch(`${API_BASE}/creator_info`, { headers: getHeaders() });
                const data = await response.json();
                
                if (data.success && data.data) {
                    const privacyLevels = data.data.privacy_level_options || data.data.privacy_levels || [];
                    const select = document.getElementById('privacyLevel');
                    
                    select.innerHTML = '';
                    
                    const levelNames = {
                        'PUBLIC_TO_EVERYONE': 'Public',
                        'FOLLOWER_OF_CREATOR': 'Followers Only',
                        'MUTUAL_FOLLOW_FRIENDS': 'Mutual Follow Friends',
                        'SELF_ONLY': 'Self Only',
                        'PRIVATE': 'Private'
                    };
                    
                    privacyLevels.forEach(level => {
                        const option = document.createElement('option');
                        option.value = level;
                        option.textContent = levelNames[level] || level;
                        select.appendChild(option);
                    });
                    
                    if (privacyLevels.length > 0) {
                        document.getElementById('uploadAlert').className = 'alert alert-info';
                        document.getElementById('uploadAlert').textContent = `已获取到 ${privacyLevels.length} 个可用隐私级别: ${privacyLevels.join(', ')}`;
                        document.getElementById('uploadAlert').style.display = 'block';
                        setTimeout(() => {
                            document.getElementById('uploadAlert').style.display = 'none';
                        }, 5000);
                    }
                }
            } catch (error) {
                console.log('获取隐私级别失败:', error);
            }
        }

        async function getAuthUrl() {
            try {
                const response = await fetch(`${API_BASE}/auth/url`, { headers: getHeaders() });
                const data = await response.json();
                
                if (data.auth_url) {
                    showAlert('status', 'info', '授权链接已生成，点击按钮打开授权页面');
                    setTimeout(() => {
                        window.open(data.auth_url, '_blank');
                    }, 1000);
                } else {
                    showAlert('status', 'error', '获取授权链接失败');
                }
            } catch (error) {
                showAlert('status', 'error', '获取授权链接失败: ' + error.message);
            }
        }

        async function uploadVideo() {
            if (isUploading) return;
            
            const videoFile = document.getElementById('videoFile').files[0];
            if (!videoFile) {
                showAlert('upload', 'error', '请选择视频文件');
                return;
            }

            isUploading = true;
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>上传中...';
            
            document.getElementById('uploadProgress').style.display = 'block';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressBar').textContent = '0%';
            
            try {
                const formData = new FormData();
                formData.append('video', videoFile);
                formData.append('title', document.getElementById('videoTitle').value || '');
                formData.append('description', document.getElementById('videoDesc').value || '');
                formData.append('user_id', 'bebcare_internal');

                const xhr = new XMLHttpRequest();
                xhr.open('POST', `${API_BASE}/upload`);
                xhr.setRequestHeader('X-API-Key', API_KEY);

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        document.getElementById('progressBar').style.width = percent + '%';
                        document.getElementById('progressBar').textContent = percent + '%';
                    }
                };

                xhr.onload = () => {
                    isUploading = false;
                    btn.disabled = false;
                    btn.textContent = '📥 上传到收件箱';
                    
                    try {
                        const response = JSON.parse(xhr.responseText);
                        if (xhr.status === 200 && response.success) {
                            showAlert('upload', 'success', `上传成功！Publish ID: ${response.publish_id}`);
                            document.getElementById('videoFile').value = '';
                            document.getElementById('videoTitle').value = '';
                            document.getElementById('videoDesc').value = '';
                            loadHistory();
                        } else {
                            showAlert('upload', 'error', '上传失败: ' + (response.error || '未知错误'));
                        }
                    } catch (e) {
                        showAlert('upload', 'error', '上传失败: 服务器响应解析错误');
                    }
                    
                    setTimeout(() => {
                        document.getElementById('uploadProgress').style.display = 'none';
                    }, 3000);
                };

                xhr.onerror = () => {
                    isUploading = false;
                    btn.disabled = false;
                    btn.textContent = '📥 上传到收件箱';
                    showAlert('upload', 'error', '上传失败: 网络错误');
                };

                xhr.send(formData);
            } catch (error) {
                isUploading = false;
                btn.disabled = false;
                btn.textContent = '📥 上传到收件箱';
                showAlert('upload', 'error', '上传失败: ' + error.message);
            }
        }

        function resetPublishButton() {
            isUploading = false;
            const btn = document.getElementById('publishBtn');
            btn.disabled = false;
            btn.textContent = '🚀 直接发布';
            document.getElementById('uploadProgress').style.display = 'none';
        }

        async function publishVideo() {
            if (isUploading) return;
            
            const videoFile = document.getElementById('videoFile').files[0];
            if (!videoFile) {
                showAlert('upload', 'error', '请选择视频文件');
                return;
            }

            isUploading = true;
            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>发布中...';
            
            document.getElementById('uploadProgress').style.display = 'block';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressBar').textContent = '0%';
            
            try {
                const formData = new FormData();
                formData.append('video', videoFile);
                formData.append('title', document.getElementById('videoTitle').value || '');
                formData.append('description', document.getElementById('videoDesc').value || '');
                formData.append('privacy_level', document.getElementById('privacyLevel').value);
                formData.append('user_id', 'bebcare_internal');

                const xhr = new XMLHttpRequest();
                xhr.open('POST', `${API_BASE}/publish`);
                xhr.setRequestHeader('X-API-Key', API_KEY);
                xhr.timeout = 60000;

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        document.getElementById('progressBar').style.width = percent + '%';
                        document.getElementById('progressBar').textContent = percent + '%';
                    }
                };

                xhr.onload = () => {
                    try {
                        const response = JSON.parse(xhr.responseText);
                        if (xhr.status === 200 && response.success) {
                            showAlert('upload', 'success', `发布成功！Publish ID: ${response.publish_id}`);
                            document.getElementById('videoFile').value = '';
                            document.getElementById('videoTitle').value = '';
                            document.getElementById('videoDesc').value = '';
                            loadHistory();
                        } else {
                            const errorMsg = response && response.error ? response.error : `HTTP ${xhr.status}`;
                            showAlert('upload', 'error', '发布失败: ' + errorMsg);
                        }
                    } catch (e) {
                        showAlert('upload', 'error', '发布失败: 服务器响应解析错误');
                    } finally {
                        resetPublishButton();
                    }
                };

                xhr.onerror = () => {
                    showAlert('upload', 'error', '发布失败: 网络错误');
                    resetPublishButton();
                };

                xhr.ontimeout = () => {
                    showAlert('upload', 'error', '发布失败: 请求超时');
                    resetPublishButton();
                };

                xhr.onabort = () => {
                    showAlert('upload', 'error', '发布失败: 请求被取消');
                    resetPublishButton();
                };

                xhr.send(formData);
            } catch (error) {
                showAlert('upload', 'error', '发布失败: ' + error.message);
                resetPublishButton();
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/history`, { headers: getHeaders() });
                const data = await response.json();
                
                const list = document.getElementById('historyList');
                const pendingCount = document.getElementById('pendingCount');
                
                if (data.records && data.records.length > 0) {
                    list.innerHTML = data.records.map(r => `
                        <div class="history-item">
                            <div class="info">
                                <div class="name">${r.video_path || '未知文件'}</div>
                                <div class="meta">
                                    Publish ID: ${r.publish_id || '-'} | 
                                    时间: ${new Date(r.created_at).toLocaleString('zh-CN')}
                                </div>
                            </div>
                            <span class="status-badge status-${r.status}">${r.status === 'uploaded' ? '已上传' : r.status === 'published' ? '已发布' : r.status}</span>
                        </div>
                    `).join('');
                    
                    const pending = data.records.filter(r => r.status === 'uploaded').length;
                    pendingCount.textContent = pending;
                } else {
                    list.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">暂无上传记录</p>';
                    pendingCount.textContent = '0';
                }
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }

        function showAlert(type, level, message) {
            const alert = document.getElementById(type + 'Alert');
            if (alert) {
                alert.className = 'alert alert-' + level;
                alert.textContent = message;
                alert.style.display = 'block';
                
                if (level === 'success') {
                    setTimeout(() => { alert.style.display = 'none'; }, 5000);
                }
            }
        }

        window.onload = () => {
            checkStatus();
            
            // 检查 URL 是否有授权成功的参数（可选改进）
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('auth_success') === 'true') {
                showAlert('status', 'success', 'TikTok 授权成功！');
                // 清理 URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        };
    </script>
</body>
